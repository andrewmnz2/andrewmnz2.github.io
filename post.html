<!DOCTYPE html>
<html>
<head>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BES4VG6VMX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BES4VG6VMX');
    </script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
          crossorigin="anonymous">

    <title>Post</title>
</head>
<body>

<div class="container-fluid">

    <div class="row" style="height:40px;padding-top:10px;">
        <div class="col-12" style="text-align:center;word-spacing:20px;">
            <a href="index.html" style="color:black;text-decoration:none;">Home</a>
        </div>
    </div>

    <div id="heroBanner"
         class="row my-auto"
         style="
            padding-left:0;
            padding-right:0;
            background-size:cover;
            background-position:center center;
         ">

        <div class="h-100 mx-auto"
             style="
                width:100%;
                background-color:rgba(0,0,0,0.2);
                padding-top:100px;
                padding-bottom:100px;
             ">

            <div class="col-sm-12 my-auto text-center">
                <h1 id="postTitle" class="display-4" style="color:white;"></h1>
                <p id="postSubtitle" style="color:white;"></p>
            </div>

        </div>
    </div>

    <div class="row justify-content-center">
        <div
            id="post"
            class="col-11 col-md-7"
            style="padding-top:50px;padding-bottom:50px;">
        </div>
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const postId = Number(params.get("id"));
const type = params.get("type");

fetch(`posts/${type}/posts.json?v=${Date.now()}`)
    .then(response => response.json())
    .then(data => {

        const post = data.posts.find(p => p.postNum === postId);

        const container = document.getElementById("post");

        if (!post) {
            container.innerHTML = `
                <h1>Post not found</h1>
                <p>The requested post does not exist.</p>
            `;
            return;
        }

        document.title = post.title;

        document.getElementById("heroBanner").style.backgroundImage =
            `url('posts/${type}/img/${post.postNum}/${post.mainImage}.jpg')`;

        document.getElementById("postTitle").textContent = post.title;
        document.getElementById("postSubtitle").textContent = post.subheading;
        let imagesHtml = "";

        for (let img = 1; img <= post.numImages; img++) {
            imagesHtml += `
                <p>
                    <a href="posts/${type}/img/${post.postNum}/${img}.jpg">
                        <img
                            src="posts/${type}/img/${post.postNum}/${img}.jpg"
                            alt="${post.title} image ${img}"
                            style="width:100%;">
                    </a>
                </p>
            `;
        }

        container.innerHTML = `
            <p><i>Posted ${post.datePosted}</i></p>

            <div style="padding-bottom:50px;">
                ${post.content}
            </div>

            ${imagesHtml}
        `;
    })
    .catch(error => {

        document.getElementById("post").innerHTML = `
            <h1>Error</h1>
            <p>Could not load post.</p>
        `;

        console.error(error);
    });

</script>

</body>
</html>
